name: 更新 TAIEX 即時行情

on:
  schedule:
    # 台灣盤中每10分鐘：9:00~14:00 (UTC 01:00~06:00)，週一至週五
    - cron: '*/10 1-6 * * 1-5'
    # 美股盤中每10分鐘：TWN 21:30~24:00 (UTC 13:30~16:00)，週一至週五
    - cron: '30,40,50 13 * * 1-5'
    - cron: '*/10 14-15 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run update script
        run: python scripts/update_taiex.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data_live.js
          git diff --staged --quiet && echo "NO_CHANGE=true" >> $GITHUB_ENV || git commit -m 'chore: 更新 TAIEX 即時行情'
          git push

      - name: Sync data_live.js to public repo
        if: env.NO_CHANGE != 'true'
        run: |
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/alvin5468/stock_info.git _stock_info
          cp data_live.js _stock_info/data_live.js
          cd _stock_info
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data_live.js
          git diff --staged --quiet || git commit -m 'chore: 更新即時行情'
          git push
